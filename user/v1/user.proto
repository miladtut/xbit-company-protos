syntax = "proto3";

package user.v1;

// مهم لتوليد كود Go
option go_package = "github.com/miladtut/xbit-company-protos/gen/go/user/v1;userv1";

// =========================
// User Service
// =========================

service UserService {

  // Get Single User
  rpc GetUser(GetUserRequest)
      returns (GetUserResponse);

  // Create User
  rpc CreateUser(CreateUserRequest)
      returns (CreateUserResponse);
}

// =========================
// Messages
// =========================

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
}

message CreateUserResponse {
  User user = 1;
}