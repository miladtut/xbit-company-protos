syntax = "proto3";

package order.v1;

// مهم لتوليد كود Go
option go_package = "github.com/company/contracts/gen/go/order/v1;orderv1";

// =========================
// Order Service
// =========================

service OrderService {

  // Get Single Order
  rpc GetOrder(GetOrderRequest)
      returns (GetOrderResponse);

  // Create Order
  rpc CreateOrder(CreateOrderRequest)
      returns (CreateOrderResponse);

  // List User Orders
  rpc ListUserOrders(ListUserOrdersRequest)
      returns (ListUserOrdersResponse);
}

// =========================
// Messages
// =========================

message Order {
  int64 id = 1;
  int64 user_id = 2;
  string status = 3;
  double total_price = 4;
}

// =========================
// Get Order
// =========================

message GetOrderRequest {
  int64 id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

// =========================
// Create Order
// =========================

message CreateOrderRequest {
  int64 user_id = 1;
  double total_price = 2;
}

message CreateOrderResponse {
  Order order = 1;
}

// =========================
// List User Orders
// =========================

message ListUserOrdersRequest {
  int64 user_id = 1;
}

message ListUserOrdersResponse {
  repeated Order orders = 1;
}